<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 마법 매거진</title>
    <style>
        /* 1. 기본 설정 및 테마 변수 */
        :root {
            --bg-color: #f4f4f0;
            --text-color: #222;
            --point-color: #e11d48;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        /* =========================================
           [실습 1] CSS Grid 메인 레이아웃 만들기
           ========================================= */
        .magazine-layout {
            max-width: 1200px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            padding: 20px;

            /* TODO 1: 여기를 Grid로 만들고, 가로를 3등분(1fr 2fr 1fr) 하세요. 간격은 20px! */
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;



        }

        header {
            /* TODO 2: 헤더가 첫 칸부터 끝 칸까지 전체 너비를 차지하게 하세요. */
            grid-column: 1/4;
            text-align: center;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 900;
        }

        aside {
            padding: 10px;
        }

        main {
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 0 20px;
        }

        /* =========================================
           [실습 2] 내부 기사 카드 Grid 배열
           ========================================= */
        .article-grid {
            /* TODO 3: 메인 영역 내부 기사들도 Grid로 만드세요 (1fr 1fr 2단 구성, 간격 15px) */
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* 기사 카드 스타일 및 Transition (마우스 오버 효과) */
        .magic-card:hover {
            border-bottom: 1px solid #ccc;
            padding-bottom: 15px;
            overflow: hidden;
            /* TODO 4: 마우스를 올렸을 때 부드럽게 위로 살짝 떠오르도록 Transition과 transform을 추가해보세요. */
            transition: 1s;
            transform: translateY(-20px);
        }

        .magic-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        /* =========================================
           [실습 3] @keyframes 애니메이션 만들기
           ========================================= */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: var(--border-color);
            color: #fff;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            /* TODO 5: 아래 만든 slide-left 애니메이션을 10초 동안 무한 반복(infinite) 선형(linear)으로 적용하세요. */
            animation-name: slide-left;
            animation-duration: 10s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        /* 텍스트가 흘러가는 애니메이션 */
        @keyframes slide-left {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        /* NEW 뱃지 깜빡임 애니메이션 */
        .badge-new {
            display: inline-block;
            background: var(--point-color);
            color: white;
            padding: 2px 8px;
            font-size: 0.8rem;
            border-radius: 12px;
            margin-bottom: 10px;

            /* TODO 6: 여기에 직접 새로운 @keyframes를 만들어 적용해보세요! (예: 둥둥 뜨기, 깜빡이기) */
            animation-name: float;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;

        }
        @keyframes float {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-3px);
            }


        }

        /* 반응형 모바일 설정 */
        @media (max-width: 800px) {
            .magazine-layout {
                grid-template-columns: 1fr;
            }

            header {
                grid-column: 1;
            }

            main {
                border: none;
                padding: 0;
                margin: 20px 0;
            }

            .article-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="magazine-layout">
        <header>
            <h1>매거진</h1>
            <p>Vol. 1 | 2026. 04. XX | 떠나고 싶은 여행지</p>
        </header>

        <!-- 흘러가는 속보 -->
        <div class="ticker-wrap" style="grid-column: 1 / -1;">
            <div class="ticker-move">🔥 [속보] 중간고사 대비 프론트엔드 핵심 요약! · 내가 좋아하는 최애 등극 · 오늘 저녁 메뉴 추천 🔥</div>
        </div>

        <aside>
            <h2 style="border-bottom: 2px solid var(--point-color); margin-bottom: 15px;">Profile</h2>
            <div style="background: #fff; padding: 15px; border: 1px solid #ddd;">
                <h4>편집장의 말</h4>
                <p style="font-size: 0.9rem; color: #666;">요즘 핫한 여행지</p>
            </div>
        </aside>

        <main>
            <div class="article-grid">
                <!-- 기사 카드 1 -->
                <article class="magic-card">
                    <span class="badge-new">NEW</span>
                    <img src="https://cdn.ardentnews.co.kr/news/photo/202410/4550_21243_5932.jpg" alt="기사 썸네일">
                    <h3 style="font-size: 1.1rem; margin: 10px 0;">요즘 많이 다니는 일본 여행</h3>
                    <p style="font-size: 0.9rem; color: #555;">요즘 열풍이 돌고 있는 일본 한 번 놀러 가보는게 어떠신지?</p>
                </article>

                <!-- 기사 카드 2 -->
                <article class="magic-card">
                    <span class="badge-new" style="background:#3b82f6;">HOT</span>
                    <img src="https://vj-prod-website-cms.s3.ap-southeast-1.amazonaws.com/shutterstock129611225huge-1675509770695.jpg" alt="기사 썸네일">
                    <h3 style="font-size: 1.1rem; margin: 10px 0;">일본의 관광명소</h3>
                    <p style="font-size: 0.9rem; color: #555;">주변의 전망이 이쁘고 밤에 현대적인 도시의화려한 풍경도 볼 수 있는 곳</p>
                </article>
            </div>
        </main>

        <aside>
            <h2 style="border-bottom: 2px solid var(--point-color); margin-bottom: 15px;">Ad</h2>
            <div
                style="background: #333; color: #fff; height: 250px; display: flex; align-items: center; justify-content: center; text-align: center;">
                <p>배너 광고<br>영역</p>
            </div>
        </aside>
    </div>

</body>

</html>
